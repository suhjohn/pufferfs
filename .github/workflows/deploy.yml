name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      pulumi_stack:
        description: Optional Pulumi stack override; defaults to the environment stack
        required: false
        type: string
      component:
        description: Deployment component
        required: true
        type: choice
        default: all
        options:
          - backend
          - frontend
          - installer
          - cli-release
          - all
      image_tag:
        description: Optional backend image tag; defaults to the workflow commit SHA
        required: false
        type: string
      cli_release_version:
        description: Optional CLI release version to mirror, for example v0.2.0; defaults to PUFFERFS_CLI_LATEST_VERSION
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}-us-west-2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: us-west-2
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      PULUMI_STACK: ${{ inputs.pulumi_stack }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'pufferfs' }}
      AVAILABILITY_ZONES: '["us-west-2a","us-west-2b"]'
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      CLI_RELEASE_VERSION: ${{ inputs.cli_release_version || vars.PUFFERFS_CLI_LATEST_VERSION }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TURBOPUFFER_API_KEY: ${{ secrets.TURBOPUFFER_API_KEY }}
      PUFFERFS_ADMIN_KEY_HASH: ${{ secrets.PUFFERFS_ADMIN_KEY_HASH }}
      MODAL_CHUNK_ENDPOINT: ${{ vars.MODAL_CHUNK_ENDPOINT || secrets.MODAL_CHUNK_ENDPOINT }}
      MODAL_EMBED_ENDPOINT: ${{ vars.MODAL_EMBED_ENDPOINT || secrets.MODAL_EMBED_ENDPOINT }}
      MODAL_QUERY_EMBED_ENDPOINT: ${{ vars.MODAL_QUERY_EMBED_ENDPOINT || secrets.MODAL_QUERY_EMBED_ENDPOINT }}
      MODAL_CHUNK_SHARD_ENDPOINT: ${{ vars.MODAL_CHUNK_SHARD_ENDPOINT || secrets.MODAL_CHUNK_SHARD_ENDPOINT }}
      MODAL_EMBED_SHARD_ENDPOINT: ${{ vars.MODAL_EMBED_SHARD_ENDPOINT || secrets.MODAL_EMBED_SHARD_ENDPOINT }}
      MODAL_INDEX_SHARD_ENDPOINT: ${{ vars.MODAL_INDEX_SHARD_ENDPOINT || secrets.MODAL_INDEX_SHARD_ENDPOINT }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
      OAUTH_REDIRECT_URL: ${{ vars.OAUTH_REDIRECT_URL }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      API_HTTPS_READY: ${{ vars.API_HTTPS_READY }}
      WEB_HTTPS_READY: ${{ vars.WEB_HTTPS_READY }}
      ENABLE_BILLING: ${{ vars.ENABLE_BILLING }}
      VITE_ENABLE_BILLING: ${{ vars.VITE_ENABLE_BILLING || vars.ENABLE_BILLING }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ vars.STRIPE_PRICE_ID }}
      PUFFERFS_CLI_LATEST_VERSION: ${{ vars.PUFFERFS_CLI_LATEST_VERSION }}
      PUFFERFS_CLI_MIN_VERSION: ${{ vars.PUFFERFS_CLI_MIN_VERSION }}
      PUFFERFS_CLI_DOWNLOAD_BASE_URL: ${{ vars.PUFFERFS_CLI_DOWNLOAD_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve deployment defaults
        run: |
          set -euo pipefail
          if [ -z "${PULUMI_STACK:-}" ]; then
            case "${{ inputs.environment }}" in
              production) echo "PULUMI_STACK=prod" >> "$GITHUB_ENV" ;;
              *) echo "PULUMI_STACK=${{ inputs.environment }}" >> "$GITHUB_ENV" ;;
            esac
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Go
        if: ${{ inputs.component == 'backend' || inputs.component == 'all' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            infra/pulumi/package-lock.json
            web/package-lock.json

      - name: Install Pulumi CLI
        run: |
          set -euo pipefail
          curl -fsSL https://get.pulumi.com | sh -s -- --version 3.236.0
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Login to Pulumi backend
        run: |
          set -euo pipefail
          if [ -n "${PULUMI_BACKEND_URL:-}" ]; then
            pulumi login "$PULUMI_BACKEND_URL"
          elif [ -n "${PULUMI_ACCESS_TOKEN:-}" ]; then
            pulumi login
          else
            echo "Set PULUMI_ACCESS_TOKEN or PULUMI_BACKEND_URL for the selected GitHub Environment." >&2
            exit 1
          fi

      - name: Install Pulumi dependencies
        working-directory: infra/pulumi
        run: npm ci

      - name: Configure Pulumi stack
        working-directory: infra/pulumi
        run: |
          set -euo pipefail
          pulumi stack select "$PULUMI_STACK" || pulumi stack init "$PULUMI_STACK" --secrets-provider passphrase
          ../../scripts/deploy/configure-pulumi.sh

      - name: Preview backend and infrastructure
        if: ${{ inputs.component == 'backend' || inputs.component == 'all' }}
        working-directory: infra/pulumi
        run: |
          npm run build
          pulumi preview --diff

      - name: Retire legacy us-east-1 service discovery services
        if: ${{ inputs.component == 'backend' || inputs.component == 'all' }}
        run: |
          set -euo pipefail
          LEGACY_REGION="us-east-1"
          NAMESPACE_NAME="${PROJECT_NAME}-${PULUMI_STACK}.local"
          NAMESPACE_ID="$(aws servicediscovery list-namespaces \
            --region "$LEGACY_REGION" \
            --filters Name=NAME,Values="$NAMESPACE_NAME",Condition=EQ Name=TYPE,Values=DNS_PRIVATE,Condition=EQ \
            --query 'Namespaces[0].Id' \
            --output text 2>/dev/null || true)"

          if [ -z "$NAMESPACE_ID" ] || [ "$NAMESPACE_ID" = "None" ]; then
            echo "No legacy Cloud Map namespace found in ${LEGACY_REGION}: ${NAMESPACE_NAME}"
            exit 0
          fi

          echo "Retiring legacy Cloud Map services in ${LEGACY_REGION}/${NAMESPACE_ID}"
          SERVICE_IDS="$(aws servicediscovery list-services \
            --region "$LEGACY_REGION" \
            --filters Name=NAMESPACE_ID,Values="$NAMESPACE_ID",Condition=EQ \
            --query 'Services[].Id' \
            --output text)"

          for SERVICE_ID in $SERVICE_IDS; do
            INSTANCE_IDS="$(aws servicediscovery list-instances \
              --region "$LEGACY_REGION" \
              --service-id "$SERVICE_ID" \
              --query 'Instances[].Id' \
              --output text)"

            for INSTANCE_ID in $INSTANCE_IDS; do
              OPERATION_ID="$(aws servicediscovery deregister-instance \
                --region "$LEGACY_REGION" \
                --service-id "$SERVICE_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'OperationId' \
                --output text || true)"
              if [ -n "$OPERATION_ID" ] && [ "$OPERATION_ID" != "None" ]; then
                for _ in $(seq 1 30); do
                  STATUS="$(aws servicediscovery get-operation \
                    --region "$LEGACY_REGION" \
                    --operation-id "$OPERATION_ID" \
                    --query 'Operation.Status' \
                    --output text)"
                  [ "$STATUS" = "SUCCESS" ] && break
                  if [ "$STATUS" = "FAIL" ]; then
                    aws servicediscovery get-operation --region "$LEGACY_REGION" --operation-id "$OPERATION_ID"
                    exit 1
                  fi
                  sleep 2
                done
              fi
            done

            for ATTEMPT in $(seq 1 30); do
              if aws servicediscovery delete-service --region "$LEGACY_REGION" --id "$SERVICE_ID"; then
                break
              fi
              if [ "$ATTEMPT" -eq 30 ]; then
                echo "Could not delete legacy Cloud Map service: $SERVICE_ID" >&2
                exit 1
              fi
              sleep 2
            done
          done

      - name: Deploy backend and infrastructure
        if: ${{ inputs.component == 'backend' || inputs.component == 'all' }}
        working-directory: infra/pulumi
        run: pulumi up --yes

      - name: Build frontend
        if: ${{ inputs.component == 'frontend' || inputs.component == 'all' }}
        working-directory: web
        run: |
          npm ci
          VITE_API_URL="${VITE_API_URL:-https://api.pufferfs.com}" \
            VITE_ENABLE_BILLING="${VITE_ENABLE_BILLING:-false}" \
            npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || vars.API_URL || 'https://api.pufferfs.com' }}

      - name: Deploy frontend
        if: ${{ inputs.component == 'frontend' || inputs.component == 'all' }}
        working-directory: infra/pulumi
        run: |
          set -euo pipefail
          WEB_BUCKET="$(pulumi stack output webBucketName)"
          WEB_DISTRIBUTION="$(pulumi stack output webDistributionId)"
          aws s3 sync ../../web/dist/client/ "s3://${WEB_BUCKET}" --delete --exclude 'releases/*' --exclude 'install.sh'
          aws cloudfront create-invalidation --distribution-id "$WEB_DISTRIBUTION" --paths '/*'

      - name: Deploy installer
        if: ${{ inputs.component == 'installer' || inputs.component == 'all' }}
        working-directory: infra/pulumi
        run: |
          set -euo pipefail
          WEB_BUCKET="$(pulumi stack output webBucketName)"
          WEB_DISTRIBUTION="$(pulumi stack output webDistributionId)"
          aws s3 cp ../../scripts/install.sh "s3://${WEB_BUCKET}/install.sh" \
            --content-type 'text/x-shellscript' \
            --cache-control 'public, max-age=300'
          aws cloudfront create-invalidation --distribution-id "$WEB_DISTRIBUTION" --paths '/install.sh'

      - name: Mirror CLI release
        if: ${{ inputs.component == 'cli-release' || inputs.component == 'all' }}
        working-directory: infra/pulumi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${CLI_RELEASE_VERSION#v}"
          [ -n "$VERSION" ] || { echo "Set cli_release_version or PUFFERFS_CLI_LATEST_VERSION." >&2; exit 1; }
          TAG="v${VERSION}"
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir "$TMPDIR" \
            --pattern 'checksums.txt' \
            --pattern "pufferfs_${VERSION}_*.tar.gz"
          test -s "$TMPDIR/checksums.txt"
          WEB_BUCKET="$(pulumi stack output webBucketName)"
          WEB_DISTRIBUTION="$(pulumi stack output webDistributionId)"
          aws s3 sync "$TMPDIR/" "s3://${WEB_BUCKET}/releases/${TAG}/" \
            --delete \
            --cache-control 'public, max-age=31536000, immutable'
          printf '%s\n' "$TAG" > "$TMPDIR/latest.txt"
          aws s3 cp "$TMPDIR/latest.txt" "s3://${WEB_BUCKET}/releases/latest.txt" \
            --content-type 'text/plain' \
            --cache-control 'public, max-age=300'
          aws cloudfront create-invalidation --distribution-id "$WEB_DISTRIBUTION" --paths "/releases/${TAG}/*" '/releases/latest.txt'

      - name: Verify deployment
        working-directory: infra/pulumi
        run: |
          set -euo pipefail
          COMPONENT="${{ inputs.component }}"
          WEB_URL="$(pulumi stack output webUrl)"

          verify_api() {
            API_URL="$(pulumi stack output apiUrl)"
            API_HOST="${API_URL#https://}"
            API_HOST="${API_HOST%%/*}"
            API_ALB="$(pulumi stack output apiAlbHostname)"
            API_IP="$(getent ahostsv4 "$API_ALB" | awk 'NR == 1 { print $1 }')"
            [ -n "$API_IP" ] || { echo "Could not resolve API ALB: $API_ALB" >&2; exit 1; }
            curl -fsS --max-time 15 --resolve "${API_HOST}:443:${API_IP}" "${API_URL}/health"
            curl -fsS --max-time 15 --resolve "${API_HOST}:443:${API_IP}" "${API_URL}/cli/version" >/dev/null
          }

          verify_frontend() {
            curl -fsSI --max-time 15 "$WEB_URL" >/dev/null
          }

          verify_installer() {
            curl -fsSI --max-time 15 "${WEB_URL}/install.sh" >/dev/null
          }

          verify_cli_release() {
            RELEASE_TAG="$(curl -fsS --max-time 15 "${WEB_URL}/releases/latest.txt")"
            [ -n "$RELEASE_TAG" ] || { echo "Missing CLI release tag" >&2; exit 1; }
            curl -fsSI --max-time 15 "${WEB_URL}/releases/${RELEASE_TAG}/checksums.txt" >/dev/null
          }

          case "$COMPONENT" in
            backend)
              verify_api
              ;;
            frontend)
              verify_frontend
              ;;
            installer)
              verify_installer
              ;;
            cli-release)
              verify_cli_release
              ;;
            all)
              verify_api
              verify_frontend
              verify_installer
              verify_cli_release
              ;;
          esac
