name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go packages
        run: go test ./...

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            infra/pulumi/package-lock.json
            web/package-lock.json

      - name: Build Pulumi project
        working-directory: infra/pulumi
        run: |
          npm ci
          npm run build

      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.16.0
          args: check

      - name: Check install script syntax
        run: sh -n scripts/install.sh
